<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/rafting.css">
    <meta name="description" content="White Water Rafting website, inside of it you will find a form to contact us, give us suggestions and ask questions">
    <meta name="author" content="Tomás Suárez">
    <title>Contact Us | White Water Rafting</title>
</head>
<body>
    <header> 
        <img src="images/logo-z-splash.png" alt="White Water Rafting Logo"> 
        <nav class="head">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>
    <main>
        <div class="hero">
            <h1>White Water Rafting company</h1>
        </div>
        <div class="info">
            <p>Main River Street</p>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+569 99999999</p>
            <p>info@wwr.org</p>
        </div>
        <section class="form-map">
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d13772.314405774052!2d-73.25786274692656!3d-39.78809820994431!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e0!3m2!1ses-419!2scl!4v1780586281030!5m2!1ses-419!2scl" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
            <form>
                <div class="form-group">
                <label for="Name">Name</label>
                <input type="text" id="Name" placeholder="Enter your name here">
                </div>

                <div class="form-group">
                <label for="Email">Email</label>
                <input type="email" id="Email" placeholder="Enter your email here">
                </div>
                
                <div class="form-group-radio">

                <div class="message-purpose">
                <span>Message purpose</span>
                </div>

                <label for="General-inquiry">
                <input type="radio" id="General-inquiry" name="purpose">
                General inquiry
                </label>

                <label for="Reservation-question">
                <input type="radio" id="Reservation-question" name="purpose">
                Reservation question
                </label>

                <label for="Website-question">
                <input type="radio" id="Website-question" name="purpose">
                Website question
                </label>
                </div>

                <div class="form-group-mesagge">
                <label for="Message">Message</label>
                <textarea name="message" id="Message" placeholder="Type here"></textarea>
                </div>
                <div class="form-group-checkbox">
                <label>
                <input type="checkbox">
                Please suscribe me to the monthly newsletter
                </label>
                </div>
                <div class="form-button">
                <button type="submit">Get in Touch!</button>
                </div>
            </form>
        </section>

        <section class="adventures">
        <h2>We are Here to serve you!</h2>
        <div class="figure-flex">
        <figure>
            <img src="" alt="Pepe Sánchez F. Portrait">
            <figcaption> Pepe Sánchez F.</figcaption>
        </figure>

        <figure>
            <img src="" alt="Albert Smith G. Portrait">
            <figcaption> Albert Smith G.</figcaption>
        </figure>

        <figure>
            <img src="" alt="Peter Park H. Portrait">
            <figcaption> Peter Park H.</figcaption>
        </figure>
        </div>
        </section>

    </main>
    <footer>
    <p>©️2026 🌊White Water Rafting🌊 Tomás Suárez </p>
    <nav class="socialmedia">
        <a href="https://web.whatsapp.com/">
        <img src="images/whatsapp.svg" alt="WhatsApp Logo">
        </a>
        <a href="https://www.instagram.com/">
        <img src="images/instagram.svg" alt="Instagram Logo">
        </a>
        <a href="https://web.facebook.com/?_rdc=1&_rdr#">
        <img src="images/facebook.svg" alt="Facebook Logo">
        </a>
    </nav>
    </footer>
</body>
</html>
